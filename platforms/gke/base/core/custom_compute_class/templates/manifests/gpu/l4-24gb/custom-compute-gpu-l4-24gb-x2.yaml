apiVersion: cloud.google.com/v1
kind: ComputeClass
metadata:
  name: gpu-l4-24gb-x2
spec:
  activeMigration:
    optimizeRulePriority: true
  nodePoolAutoCreation:
    enabled: true
  priorities:
    # Use reservations if available, fall back to on-demand otherwise
    - gpu:
        count: 2
        driverVersion: latest
        type: nvidia-l4
      machineType: g2-standard-24
      maxPodsPerNode: 16
      reservations:
        affinity: AnyBestEffort
      spot: false

    # Use DWS FlexStart with 7 day limit
    - flexStart:
        enabled: true
        nodeRecycling:
          leadTimeSeconds: 3600
      gpu:
        count: 2
        driverVersion: latest
        type: nvidia-l4
      machineType: g2-standard-24
      maxPodsPerNode: 16
      maxRunDurationSeconds: 604800

    # Use spot
    - gpu:
        count: 2
        driverVersion: latest
        type: nvidia-l4
      machineType: g2-standard-24
      maxPodsPerNode: 16
      spot: true
