---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${service_account_name}
  namespace: mlflow-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-tracking
  namespace: mlflow-system
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: mlflow-tracking
  template:
    metadata:
      labels:
        app: mlflow-tracking
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: ${service_account_name}
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v${mlflow_version}
        resources:
          requests:
            cpu: "2"
            memory: "10Gi"
          limits:
            cpu: "2"
            memory: "10Gi"
        command: ["sh", "-c"]
        args: 
        - |
          mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlruns/mlflow.db
        volumeMounts:
        - name: gcs-fuse-csi-ephemeral
          mountPath: /mlruns
      volumes:
      - name: gcs-fuse-csi-ephemeral
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            bucketName: ${bucket_name}
            mountOptions: "implicit-dirs"
            gcsfuseLoggingSeverity: warning
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-tracking-svc
  namespace: mlflow-system
spec:
  selector:
    app: mlflow-tracking
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
