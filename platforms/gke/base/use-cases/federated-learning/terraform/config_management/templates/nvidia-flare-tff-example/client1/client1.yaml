---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvflare-configmap-client1
  namespace: ${namespace_name}
data:
  site: site-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvflare-client1
  namespace: ${namespace_name}
  labels:
    run: nvflare-client1
spec:
  replicas: 1
  selector:
    matchLabels:
      run: nvflare-client1
  template:
    metadata:
      labels:
        run: nvflare-client1
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      containers:
        - name: nvflare
          image: ${federated_learning_nvidia_flare_tff_example_localized_container_image_id}:${federated_learning_nvidia_flare_tff_example_container_image_tag}
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /usr/local/bin/python3
          args:
            - -u
            - -m
            - nvflare.private.fed.app.client.client_train
            - -m
            - /workspace/nvfl/workspace/example_project/prod_00/$(SITE)
            - -s
            - fed_client.json
            - --set
            - secure_train=true
            - uid=$(SITE)
            - config_folder=config
            - org=nvidia
          env:
            - name: SITE
              valueFrom:
                configMapKeyRef:
                  key: site
                  name: nvflare-configmap-client1
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: nvfl
              mountPath: /workspace/nvfl/
      serviceAccountName: ${tenant_apps_kubernetes_service_account_name}
      volumes:
        - name: nvfl
          persistentVolumeClaim:
            claimName: nvflare-pv-claim
      securityContext:
        fsGroup: 1000
