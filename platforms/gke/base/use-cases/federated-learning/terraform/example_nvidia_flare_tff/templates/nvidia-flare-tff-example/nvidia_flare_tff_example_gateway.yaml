%{ if startswith(nvidia_flare_tff_example_workload_name, "server") }
---
# Expose additional ports for NVFLARE
apiVersion: v1
kind: Service
metadata:
  name: istio-ingressgateway-nvflare
  namespace: istio-ingress
spec:
  type: LoadBalancer
  selector:
    istio: ingressgateway
    app: istio-ingressgateway
  ports:
    - port: 8002
      protocol: TCP
      targetPort: 8002
      name: flport
    - port: 8003
      protocol: TCP
      targetPort: 8003
      name: adminport
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-gateway-nvflare
  namespace: istio-ingress
spec:
  podSelector:
    matchLabels:
      istio: ingressgateway
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8002
        - protocol: TCP
          port: 8003
---
# Create a service mesh gateway
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: ingress-gateway-nvflare
  namespace: istio-ingress
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 8002
        name: flport
        protocol: TCP
    - port:
        number: 8003
        name: adminport
        protocol: TCP
---
# Allow traffic to NVFLARE ports
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-ingressgateway-nvflare
  namespace: istio-ingress
spec:
  action: ALLOW
  selector:
    matchLabels:
      istio: ingressgateway
  rules:
    - to:
        - operation:
            ports:
              - "8002"
              - "8003"
%{ endif }
