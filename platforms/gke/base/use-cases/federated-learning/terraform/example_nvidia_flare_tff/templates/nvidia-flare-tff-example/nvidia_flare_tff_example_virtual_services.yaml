%{ if startswith(nvidia_flare_tff_example_workload_name, "server") }
---
# Direct traffic from the sidecars to the egress gateway and from the egress gateway to the external service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: client1-through-egress-gateway
  namespace: ${namespace_name}
spec:
  hosts:
    - client1
    - client1.${nvidia_flare_tff_example_site_domain}
  gateways:
    - istio-egress/egress-gateway
    - mesh
  tcp:
    - match:
        - gateways:
            - mesh
          port: 8002
      route:
        - destination:
            host: istio-egressgateway.istio-egress.svc.cluster.local
            port:
              number: 8443
          weight: 100
    - match:
        - gateways:
            - istio-egress/egress-gateway
          port: 8443
      route:
        - destination:
            host: client1.${nvidia_flare_tff_example_site_domain}
            port:
              number: 443
          weight: 100
---
