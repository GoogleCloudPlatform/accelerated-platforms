---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-perf-config
  namespace: ${BENCHMARKING_KUBERNETES_NAMESPACE}
data:
  config.yaml: |
    load:
      type: concurrent
      stages:
      - num_requests: 300
        concurrency_level: 10
      - num_requests: 300
        concurrency_level: 20
      - num_requests: 300
        concurrency_level: 30
      - num_requests: 300
        concurrency_level: 40
      - num_requests: 300
        concurrency_level: 50
      num_workers: 1
    api: 
      type: completion
      streaming: true
    server:
      type: vllm
      model_name: /gcs/${HF_MODEL_ID}
      base_url: ${GATEWAY_URL}
      ignore_eos: true
    tokenizer:
      pretrained_model_name_or_path: ${HF_MODEL_ID}
    data:
      type: conversation_replay
      conversation_replay:
        system_prompt_length: 1000
        input_sequence_length:
          distribution_type: log_normal
          min: 500
          max: 15000
          mean: 4000
          standard_deviation: 2500
        output_sequence_length:
          distribution_type: normal
          min: 10
          max: 1000
          mean: 300
          standard_deviation: 150
        number_of_turns:
          distribution_type: log_normal
          min: 1
          max: 15
          mean: 4
          standard_deviation: 2.5
        time_between_turns:
          distribution_type: log_normal
          min: 5
          max: 300
          mean: 45
          standard_deviation: 40
        input_tokens_per_turn:
          distribution_type: log_normal
          min: 10
          max: 1000
          mean: 50
          standard_deviation: 40
    metrics:
      type: prometheus
      prometheus:
          scrape_interval: 15
          google_managed: true         # Whether using Google Managed Prometheus
          filters: [] 
    report:
      request_lifecycle:
        summary: true
        per_stage: true
        per_request: true
      prometheus:
        summary: true
        per_stage: true
    storage:
      google_cloud_storage:               
        bucket_name: ${hub_models_bucket_bench_results_name}   # Required GCS bucket
        report_file_prefix: null          # Optional filename prefix
        
