apiVersion: batch/v1
kind: Job
metadata:
  name: k6-benchmark
  namespace: replaced-by-kustomize
spec:
  template:
    spec:
      containers:
        - name: k6-benchmark
          args:
            - "/app/scripts/k6-diffusers-flux-2-klein-4b.js"
          resources:
            limits:
              cpu: "2"
              memory: 1G
            requests:
              cpu: "2"
              memory: 1G
