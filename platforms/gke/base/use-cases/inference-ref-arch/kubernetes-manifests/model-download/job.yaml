---
apiVersion: batch/v1
kind: Job
metadata:
  name: hf-model-to-gcs
  namespace: replaced-by-kustomize
spec:
  backoffLimit: 0
  template:
    metadata:
      annotations:
        gke-gcsfuse/cpu-limit: "0"
        gke-gcsfuse/ephemeral-storage-limit: "0"
        gke-gcsfuse/memory-limit: "0"
        gke-gcsfuse/volumes: "true"
      labels:
        app: hf-model-to-gcs
    spec:
      containers:
        - command:
            - bash
            - "-c"
            - |
              set -o errexit
              set -o nounset
              set -o pipefail

              start=$(date +%s)

              if [ -z "${MODEL_ID:-}" ]; then
                echo "Error: MODEL_ID is not set."
                exit 1
              fi
               if [ -z "${MODEL_BUCKET_NAME:-}" ]; then
                echo "Error: MODEL_BUCKET_NAME is not set."
                exit 1
              fi

              echo "Downloading ${MODEL_ID} to ${MODEL_BUCKET_NAME} Cloud Storage bucket"
              echo "Debug Hugging Face token path: ${HF_TOKEN_PATH}"

              pip3 install \
              --break-system-packages \
              --root-user-action=ignore \
              --upgrade \
              huggingface_hub

              start_download=$(date +%s)
              hf download \
              --local-dir /local/temp \
              --repo-type model \
              ${MODEL_ID}
              end_download=$(date +%s)
              runtime_download=$((end_download - start_download))
              echo "Download runtime: $(date -d@${runtime_download} -u +%H:%M:%S)"

              start_transfer=$(date +%s)
              rm -rfv /local/temp/.cache
              mkdir -pv "/gcs/${MODEL_ID}"
              mv -v /local/temp/* "/gcs/${MODEL_ID}/"
              rm -rfv /local/temp /gcs/.gcsfuse_tmp
              end_transfer=$(date +%s)
              runtime_transfer=$((end_transfer - start_transfer))
              echo "Transfer runtime: $(date -d@${runtime_transfer} -u +%H:%M:%S)"

              end=$(date +%s)
              runtime=$((end - start))
              echo "Total runtime: $(date -d@${runtime} -u +%H:%M:%S)"
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  key: MODEL_ID
                  name: downloader
            - name: MODEL_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  key: MODEL_BUCKET_NAME
                  name: downloader
            - name: HF_TOKEN_PATH
              value: /var/run/secrets/huggingface.co/token
          image: gcr.io/google.com/cloudsdktool/cloud-sdk:529.0.0-slim
          name: hf-model-to-gcs
          resources:
            limits:
              cpu: 4000m
              memory: 8Gi
            requests:
              cpu: 4000m
              memory: 8Gi
          volumeMounts:
            - mountPath: /gcs
              name: huggingface-hub-model-bucket
            - mountPath: /local
              name: local-ssd
            - mountPath: /var/run/secrets/huggingface.co
              name: huggingface-token
      restartPolicy: OnFailure
      securityContext:
        fsGroup: 10000
      serviceAccountName: replaced-by-kustomize
      terminationGracePeriodSeconds: 0
      volumes:
        - csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: replaced-by-kustomize
              mountOptions: "write-global-max-blocks=-1"
          name: huggingface-hub-model-bucket
        - csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: huggingface-token-read
          name: huggingface-token
        - emptyDir: {}
          name: local-ssd
  ttlSecondsAfterFinished: 600
