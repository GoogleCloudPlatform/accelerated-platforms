apiVersion: apps/v1
kind: Deployment
metadata:
  name: diffusers
  namespace: replaced-by-kustomize
spec:
  template:
    spec:
      containers:
        - name: inference-server
          env:
            - name: NUM_GPUS
              valueFrom:
                configMapKeyRef:
                  name: runtime
                  key: NUM_GPUS
            - name: TENSOR_PARALLEL_SIZE
              valueFrom:
                configMapKeyRef:
                  name: runtime
                  key: TENSOR_PARALLEL_SIZE
          command:
            - sglang
            - serve
          args:
            - "--model-path=/gcs/$(MODEL_ID)"
            - "--tp-size=$(TENSOR_PARALLEL_SIZE)"
            - "--trust-remote-code"
            - "--port=30000"
            - "--host=0.0.0.0"
            - "--backend=sglang"
            - "--num-gpus=$(NUM_GPUS)"
