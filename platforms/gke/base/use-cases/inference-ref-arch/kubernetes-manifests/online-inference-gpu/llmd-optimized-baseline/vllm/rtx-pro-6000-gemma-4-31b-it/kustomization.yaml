---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: replaced-by-kustomize

configMapGenerator:
  - envs:
      - runtime.env
    name: runtime

nameSuffix: -rtx-pro-6000-gemma-4-31b-it

patches:
  - path: patch-nodeselector.yaml
    target:
      kind: Deployment
      name: optimized-baseline-nvidia-gpu-vllm-decode
  - path: patch-resources.yaml
    target:
      kind: Deployment
      name: optimized-baseline-nvidia-gpu-vllm-decode
  - path: patch-vllm-args.yaml
    target:
      kind: Deployment
      name: optimized-baseline-nvidia-gpu-vllm-decode

replacements:
  - source:
      fieldPath: data.INFERENCE_KUBERNETES_NAMESPACE
      kind: ConfigMap
      name: deployment
    targets:
      - fieldPaths:
          - metadata.namespace
        select:
          kind: ConfigMap
      - fieldPaths:
          - metadata.namespace
        select:
          kind: Deployment
      - fieldPaths:
          - metadata.namespace
        select:
          kind: Service
      - fieldPaths:
          - metadata.namespace
        select:
          kind: ServiceAccount
  - source:
      fieldPath: data.INFERENCE_KUBERNETES_SERVICE_ACCOUNT
      kind: ConfigMap
      name: deployment
    targets:
      - fieldPaths:
          - spec.template.spec.serviceAccountName
        select:
          kind: Deployment
      - fieldPaths:
          - metadata.name
        select:
          kind: ServiceAccount
  - source:
      fieldPath: data.MODEL_NAME
      kind: ConfigMap
      name: runtime
    targets:
      - fieldPaths:
          - spec.template.metadata.labels.[llm-d.ai/model]
        select:
          kind: Deployment

resources:
  - ../base
