---
apiVersion: v1
kind: Service
metadata:
  name: vllm-a100
spec:
  selector:
    app: vllm-a100
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PodTemplate
metadata:
  name: vllm-a100
template:
  spec:
    nodeSelector:
      cloud.google.com/gke-nodepool: gpu-a100x8-a2h8-dws
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "on-demand"
        value: "true"
        operator: "Equal"
        effect: "NoSchedule"
    containers:
      - name: pi
        image: perl
        command: ["/bin/sh"]
        resources:
          limits:
            cpu: "700m"
            nvidia.com/gpu: "8"
          requests:
            cpu: "700m"
            nvidia.com/gpu: "8"
    restartPolicy: Never
---
apiVersion: autoscaling.x-k8s.io/v1beta1
kind: ProvisioningRequest
metadata:
  name: vllm-a100
spec:
  provisioningClassName: queued-provisioning.gke.io
  parameters:
    maxRunDurationSeconds: "86400"
  podSets:
    - count: 1
      podTemplateRef:
        name: vllm-a100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-a100
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-a100
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm-a100
      annotations:
        gke-gcsfuse/volumes: "true"
        gke-gcsfuse/cpu-limit: "0"
        gke-gcsfuse/memory-limit: "0"
        gke-gcsfuse/ephemeral-storage-limit: "0"
        cluster-autoscaler.kubernetes.io/consume-provisioning-request: vllm-a100
        cluster-autoscaler.kubernetes.io/provisioning-class-name: "queued-provisioning.gke.io"
    spec:
      containers:
        - name: fetch-safetensors
          image: busybox
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "########### $(date) - Starting parallel-fetch-safetensors"
              find /gcs/${MODEL_ID}/*safetensors -type f | xargs -I {} -P 15 sh -c 'echo "########### $(date) - Fetching: {}"; dd if={} of=/dev/null'
              echo "########### $(date) - Finished parallel-fetch-safetensors"
              sleep infinity
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  key: MODEL_ID
                  name: model-download-configmap
          volumeMounts:
            - name: gcsfuse
              mountPath: /gcs/
              readOnly: true
        - name: inference-server
          args:
            - --model=/gcs/$(MODEL_ID)
            - --tensor-parallel-size=8
            - --trust-remote-code
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  key: MODEL_ID
                  name: model-download-configmap
          image: vllm/vllm-openai:v0.8.4
          imagePullPolicy: Always
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 1
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            requests:
              cpu: "64"
              memory: "192G"
              nvidia.com/gpu: "8"
            limits:
              cpu: "64"
              memory: "192G"
              nvidia.com/gpu: "8"
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
            - name: gcsfuse
              mountPath: /gcs/
              readOnly: true
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-a100
      serviceAccountName: ira-online-gpu-ksa
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "on-demand"
          value: "true"
          operator: "Equal"
          effect: "NoSchedule"
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
        - name: gcsfuse
          csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: cloud-storage-bucket-name
              mountOptions: "metadata-cache:ttl-secs:-1,metadata-cache:stat-cache-max-size-mb:-1,metadata-cache:type-cache-max-size-mb:-1,metadata-cache:negative-ttl-secs:0,file-cache:max-size-mb:-1,file-cache:cache-file-for-range-read:true,file-cache:enable-parallel-downloads:true,implicit-dirs,file-system:kernel-list-cache-ttl-secs:-1,only-dir:${MODEL_NAME}/${MODEL_VERSION}/"
              skipCSIBucketAccessCheck: "true"
        - name: gke-gcsfuse-cache
          emptyDir:
            medium: Memory
        - name: gke-gcsfuse-tmp
          emptyDir:
            medium: Memory
        - name: gke-gcsfuse-buffer
          emptyDir:
            medium: Memory
