---
apiVersion: batch/v1
kind: Job
metadata:
  name: vllm-auto-tuning
  namespace: replaced-by-kustomize
spec:
  template:
    metadata:
      annotations:
        gke-gcsfuse/cpu-limit: "0"
        gke-gcsfuse/ephemeral-storage-limit: "0"
        gke-gcsfuse/memory-limit: "0"
        gke-gcsfuse/volumes: "true"
      labels:
        ai.gke.io/model: replaced-by-kustomize
        app: vllm-auto-tuning
    spec:
      serviceAccountName: replaced-by-kustomize
      containers:
        - args:
            - |
              echo "########### $(date) - Starting parallel-fetch-safetensors for model: ${MODEL_ID}"
              ls -alR /gcs
              find /gcs/${MODEL_ID}/*safetensors -type f | xargs -I {} -P 15 sh -c 'echo "########### $(date) - Fetching: {}"; dd if={} of=/dev/null'
              echo "########### $(date) - Finished parallel-fetch-safetensors"
          command: ["/bin/sh", "-c"]
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  key: MODEL_ID
                  name: runtime
          image: busybox
          name: fetch-safetensors
          volumeMounts:
            - mountPath: /gcs
              name: huggingface-hub-model-bucket
              readOnly: true
        - name: autotuner
          image: replaced-by-kustomize
          command: ["/bin/bash", "-c"]
          env:
            - name: VLLM_CACHE_ROOT
              value: /gcs
            - name: DOWNLOAD_DIR
              value: /gcs
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: MODEL
              valueFrom:
                configMapKeyRef:
                  key: MODEL_LOCATION
                  name: runtime
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: VLLM_AUTO_TUNING_RESULTS_BUCKET
              valueFrom:
                configMapKeyRef:
                  key: VLLM_AUTO_TUNING_RESULTS_BUCKET
                  name: vllm
            - name: GPU_MEMORY_UTILIZATION
              valueFrom:
                configMapKeyRef:
                  key: GPU_MEMORY_UTILIZATION
                  name: runtime
            - name: TP
              value: "1"
            - name: INPUT_LEN
              valueFrom:
                configMapKeyRef:
                  key: INPUT_LEN
                  name: runtime
            - name: OUTPUT_LEN
              valueFrom:
                configMapKeyRef:
                  key: OUTPUT_LEN
                  name: runtime
            - name: MAX_MODEL_LEN
              valueFrom:
                configMapKeyRef:
                  key: MAX_MODEL_LEN
                  name: runtime
            - name: NUM_SEQS_LIST
              valueFrom:
                configMapKeyRef:
                  key: NUM_SEQS_LIST
                  name: runtime
            - name: NUM_BATCHED_TOKENS_LIST
              valueFrom:
                configMapKeyRef:
                  key: NUM_BATCHED_TOKENS_LIST
                  name: runtime
            - name: MIN_CACHE_HIT_PCT
              valueFrom:
                configMapKeyRef:
                  key: MIN_CACHE_HIT_PCT
                  name: runtime
            - name: MAX_LATENCY_ALLOWED_MS
              valueFrom:
                configMapKeyRef:
                  key: MAX_LATENCY_ALLOWED_MS
                  name: runtime
          args: ["/mnt/config/auto_tune.sh"]
          volumeMounts:
            - name: config-volume
              mountPath: /mnt/config
            - mountPath: /gcs
              name: huggingface-hub-model-bucket
            - mountPath: /output
              name: vllm-auto-tuner-results
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: config-volume
          configMap:
            name: vllm-auto-tuning-script
            defaultMode: 0755
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "16Gi"
        - name: results
          emptyDir: {}
        - csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: huggingface-token-read
          name: huggingface-token
        - csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: cloud-storage-bucket-name
              mountOptions: metadata-cache:ttl-secs:-1,metadata-cache:stat-cache-max-size-mb:-1,metadata-cache:type-cache-max-size-mb:-1,metadata-cache:negative-ttl-secs:0,file-cache:max-size-mb:-1,file-cache:cache-file-for-range-read:true,file-cache:enable-parallel-downloads:true,implicit-dirs,file-system:kernel-list-cache-ttl-secs:-1,only-dir:replaced-by-kustomize,uid=2000,gid=2000
              skipCSIBucketAccessCheck: "true"
          name: huggingface-hub-model-bucket
        - csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: cloud-storage-bucket-name
              mountOptions: implicit-dirs,uid=2000,gid=2000
              skipCSIBucketAccessCheck: "true"
          name: vllm-auto-tuner-results
        - emptyDir:
            medium: Memory
          name: gke-gcsfuse-cache
        - emptyDir:
            medium: Memory
          name: gke-gcsfuse-tmp
        - emptyDir:
            medium: Memory
          name: gke-gcsfuse-buffer
      restartPolicy: OnFailure
      securityContext:
        fsGroup: 10000
