---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: vllm-model-pv
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 100Gi
  storageClassName: gcsfusecsi-serving
  csi:
    driver: gcsfuse.csi.storage.gke.io
    volumeHandle: cloud-storage-bucket-name
    volumeAttributes:
      # Rapid Cache (Anywhere Cache) is automatically enabled by the StorageClass
      # HNS buckets don't need implicit-dirs
      mountOptions: "metadata-cache:ttl-secs:-1,metadata-cache:stat-cache-max-size-mb:-1,metadata-cache:type-cache-max-size-mb:-1,metadata-cache:negative-ttl-secs:0,file-cache:max-size-mb:-1,file-cache:cache-file-for-range-read:true,file-cache:enable-parallel-downloads:true,gcs-connection:client-protocol:grpc,only-dir:replace-me"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-model-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: gcsfusecsi-serving
  volumeName: vllm-model-pv
