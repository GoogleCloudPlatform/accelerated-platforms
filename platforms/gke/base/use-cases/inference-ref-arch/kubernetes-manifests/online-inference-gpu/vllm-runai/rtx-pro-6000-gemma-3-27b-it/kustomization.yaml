---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: inf-az-fast-online-gpu

configMapGenerator:
  - envs:
      - runtime.env
    name: runtime
    namespace: replaced-by-kustomize

nameSuffix: -rtx-pro-6000-gemma-3-27b-it

patches:
  - path: patch-nodeselector.yaml
  - path: patch-resources.yaml
  - patch: |
      - op: replace
        path: /spec/template/spec/volumes/1
        value:
          name: huggingface-hub-model-bucket
          persistentVolumeClaim:
            claimName: vllm-model-pvc
    target:
      kind: Deployment
      name: vllm

replacements:
  - source:
      fieldPath: data.APP_LABEL
      kind: ConfigMap
      name: runtime
    targets:
      - fieldPaths:
          - spec.selector.matchLabels.app
          - spec.template.metadata.labels.app
        select:
          kind: Deployment
      - fieldPaths:
          - spec.selector.app
        select:
          kind: Service
      - fieldPaths:
          - spec.selector.matchLabels.app
        select:
          kind: PodSnapshotPolicy
  - source:
      fieldPath: data.CONTAINER_IMAGE_URL
      kind: ConfigMap
      name: vllm
    targets:
      - fieldPaths:
          - spec.template.spec.containers.[name=inference-server].image
        select:
          kind: Deployment
  - source:
      fieldPath: data.INFERENCE_KUBERNETES_NAMESPACE
      kind: ConfigMap
      name: deployment
    targets:
      - fieldPaths:
          - metadata.namespace
        select:
          kind: ConfigMap
      - fieldPaths:
          - metadata.namespace
        select:
          kind: Deployment
      - fieldPaths:
          - metadata.namespace
        select:
          kind: Service
      - fieldPaths:
          - metadata.namespace
        select:
          kind: ServiceAccount
      - fieldPaths:
          - metadata.namespace
        select:
          kind: HorizontalPodAutoscaler
      - fieldPaths:
          - metadata.namespace
        select:
          kind: PodSnapshotPolicy
      - fieldPaths:
          - metadata.namespace
        select:
          kind: PodSnapshotStorageConfig
  - source:
      fieldPath: data.INFERENCE_KUBERNETES_SERVICE_ACCOUNT
      kind: ConfigMap
      name: deployment
    targets:
      - fieldPaths:
          - spec.template.spec.serviceAccountName
        select:
          kind: Deployment
      - fieldPaths:
          - metadata.name
        select:
          kind: ServiceAccount
  - source:
      fieldPath: data.MODEL_BUCKET_NAME
      kind: ConfigMap
      name: deployment
    targets:
      - fieldPaths:
          - spec.csi.volumeHandle
        options:
          delimiter: .
          index: 0
        select:
          kind: PersistentVolume
          name: vllm-model-pv
      - fieldPaths:
          - spec.snapshotStorageConfig.gcs.bucket
        select:
          kind: PodSnapshotStorageConfig
  - source:
      fieldPath: data.MODEL_ID
      kind: ConfigMap
      name: runtime
    targets:
      - fieldPaths:
          - spec.csi.volumeAttributes.mountOptions
        options:
          delimiter: "only-dir:"
          index: 1
        select:
          kind: PersistentVolume
          name: vllm-model-pv
      - fieldPaths:
          - spec.template.spec.containers.[name=inference-server].volumeMounts.[name=huggingface-hub-model-bucket].mountPath
        options:
          delimiter: /
          index: 2
        select:
          kind: Deployment
  - source:
      fieldPath: metadata.name
      kind: PodSnapshotStorageConfig
      name: vllm-snapshot-config
    targets:
      - fieldPaths:
          - spec.storageConfigName
        select:
          kind: PodSnapshotPolicy
  - source:
      fieldPath: metadata.name
      kind: PodSnapshotPolicy
      name: vllm-snapshot-policy
    targets:
      - fieldPaths:
          - metadata.annotations.[podsnapshot.gke.io/restore-from-policy]
        select:
          kind: Deployment
  - source:
      fieldPath: data.MODEL_NAME
      kind: ConfigMap
      name: runtime
    targets:
      - fieldPaths:
          - spec.template.metadata.labels.[ai.gke.io/model]
        select:
          kind: Deployment

resources:
  - ../base
  - gcs-pvc.yaml
