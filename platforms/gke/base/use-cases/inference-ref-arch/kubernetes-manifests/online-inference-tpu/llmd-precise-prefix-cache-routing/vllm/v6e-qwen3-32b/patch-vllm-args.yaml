---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: precise-prefix-cache-routing-tpu-v6-vllm-decode
spec:
  template:
    spec:
      containers:
        - name: modelserver
          envFrom:
            - configMapRef:
                name: runtime
          env:
            - name: MODEL_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: deployment
                  key: MODEL_BUCKET_NAME
          args:
            - "--model=gs://$(MODEL_BUCKET_NAME)/$(MODEL_ID)"
            - "--port=8000"
            - "--tensor-parallel-size=$(TENSOR_PARALLEL_SIZE)"
            - "--block-size=64"
            - "--max-model-len=$(MAX_MODEL_LEN)"
            - "--gpu-memory-utilization=$(GPU_MEMORY_UTILIZATION)"
            - "--kv-events-config"
            - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"$(KV_EVENTS_ENDPOINT)","topic":"kv@$(POD_IP):$(POD_PORT)@$(MODEL_ID)"}'
            - "--served-model-name=$(MODEL_ID)"
            - "--disable-access-log-for-endpoints=/health,/metrics,/v1/models"
            - "--load-format=runai_streamer"
            - '--model-loader-extra-config={"distributed":true}'
