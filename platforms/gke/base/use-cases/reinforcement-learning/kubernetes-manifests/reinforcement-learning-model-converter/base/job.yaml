---
apiVersion: batch/v1
kind: Job
metadata:
  name: model-converter
  namespace: replaced-by-kustomize
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      annotations:
        gke-gcsfuse/cpu-limit: "0"
        gke-gcsfuse/ephemeral-storage-limit: "0"
        gke-gcsfuse/memory-limit: "0"
        gke-gcsfuse/volumes: "true"
      labels:
        app: model-converter
    spec:
      restartPolicy: Never
      serviceAccountName: replaced-by-kustomize
      containers:
        - name: model-converter
          image: replaced-by-kustomize # Replace with your pushed model-converter image
          command:
            - python
            - src/maxtext/checkpoint_conversion/to_maxtext.py
          args:
            - "--hf_model_path=/gcs/$(MODEL_ID)"
            - "--lazy_load_tensors=True"
            # Add output flags based on your specific MaxText version, e.g.,
            # - "--base_output_directory=/gcs/converted_models/"
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  key: MODEL_ID
                  name: reinforcement-learning-model-converter
          resources:
            requests:
              cpu: "4"
              memory: "32Gi"
            limits:
              cpu: "8"
              memory: "64Gi"
          volumeMounts:
            - mountPath: /dev/shm
              name: dev-shm
            - mountPath: /gcs
              name: huggingface-hub-model-bucket
      volumes:
        - emptyDir:
            medium: Memory
          name: dev-shm
        - csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: cloud-storage-bucket-name
              mountOptions: metadata-cache:ttl-secs:-1,metadata-cache:stat-cache-max-size-mb:-1,metadata-cache:type-cache-max-size-mb:-1,metadata-cache:negative-ttl-secs:0,file-cache:max-size-mb:-1,file-cache:cache-file-for-range-read:true,file-cache:enable-parallel-downloads:true,implicit-dirs,file-system:kernel-list-cache-ttl-secs:-1,only-dir:replaced-by-kustomize
              skipCSIBucketAccessCheck: "true"
          name: huggingface-hub-model-bucket
        - emptyDir:
            medium: Memory
          name: gke-gcsfuse-cache
        - emptyDir:
            medium: Memory
          name: gke-gcsfuse-tmp
        - emptyDir:
            medium: Memory
          name: gke-gcsfuse-buffer
