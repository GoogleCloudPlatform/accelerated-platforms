---
apiVersion: batch/v1
kind: Job
metadata:
  name: reinforcement-learning-maxtext-grpo
  namespace: replaced-by-kustomize
spec:
  backoffLimit: 0 
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        cloud.google.com/compute-class: "tpu-v5e-2x4"
      containers:
        - name: grpo-trainer
          image: replaced-by-kustomize
          resources:
            requests:
              google.com/tpu: 8 
            limits:
              google.com/tpu: 8 
          env:
          - name: MLFLOW_TRACKING_URI
            value: "http://mlflow-service:5000"
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-secret
                key: token
      serviceAccountName: replaced-by-kustomize
