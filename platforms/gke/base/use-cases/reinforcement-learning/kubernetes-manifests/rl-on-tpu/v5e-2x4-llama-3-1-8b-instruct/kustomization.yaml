---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

nameSuffix: "-v5e-2x4-llama-3-1-8b-instruct"

patches:
  - path: patch-nodeselector.yaml
  - path: patch-resources.yaml

replacements:
  - source:
      fieldPath: data.CONTAINER_IMAGE_URL
      kind: ConfigMap
      name: runtime
    targets:
      - fieldPaths:
          - spec.template.spec.containers.[name=grpo-trainer].image
        select:
          kind: Job
  - source:
      fieldPath: data.INFERENCE_KUBERNETES_NAMESPACE
      kind: ConfigMap
      name: runtime
    targets:
      - fieldPaths:
          - metadata.namespace
        select:
          kind: Job
  - source:
      fieldPath: data.INFERENCE_KUBERNETES_SERVICE_ACCOUNT
      kind: ConfigMap
      name: runtime
    targets:
      - fieldPaths:
          - spec.template.spec.serviceAccountName
        select:
          kind: Job

resources:
  - ../base
