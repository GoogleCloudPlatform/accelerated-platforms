apiVersion: v1
kind: Pod
metadata:
  name: access-to-harness-data-workload-pvc
  labels:
    app: llm-d-benchmark-harness
    role: llm-d-benchmark-data-access
spec:
  containers:
  - name: rsync
    image: ghcr.io/llm-d/llm-d-benchmark:v0.7.0
    imagePullPolicy: Always
    securityContext:
      runAsUser: 0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    command: ["rsync", "--daemon", "--no-detach", "--port=20873", "--log-file=/dev/stdout"]
    volumeMounts:
    - name: requests
      mountPath: /requests
  volumes:
  - name: requests
    persistentVolumeClaim:
      claimName: workload-pvc
