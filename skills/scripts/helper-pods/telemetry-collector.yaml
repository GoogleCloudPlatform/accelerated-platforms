apiVersion: v1
kind: Pod
metadata:
  name: telemetry-collector
spec:
  serviceAccountName: inference-perf-runner
  restartPolicy: Never
  containers:
    - name: collector
      image: ghcr.io/llm-d/llm-d-benchmark:v0.6.7
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -e
          ACCESS_TOKEN=$(curl -s -H "Metadata-Flavor: Google" "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" | python3 -c "import sys, json; print(json.load(sys.stdin)['access_token'])")
          PROJECT_ID=$(curl -s -H "Metadata-Flavor: Google" "http://metadata.google.internal/computeMetadata/v1/instance/project-level-project-id")
          START_TIME=$(date -u -d '3 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          END_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LATEST_DIR=$(ls -td /requests/inference-perf-* 2>/dev/null | head -n 1 || true)
          if [ -n "$LATEST_DIR" ]; then
            echo "Writing metrics to $LATEST_DIR/dcgm_metrics.json"
            curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://monitoring.googleapis.com/v3/projects/${PROJECT_ID}/timeSeries?filter=metric.type%3D%22kubernetes.io/container/accelerator/duty_cycle%22&interval.startTime=${START_TIME}&interval.endTime=${END_TIME}" \
              > "$LATEST_DIR/dcgm_metrics.json"
            echo "DCGM metrics collection complete."
          else
            echo "Warning: No results directory found on PVC"
          fi
      volumeMounts:
        - name: requests
          mountPath: /requests
  volumes:
    - name: requests
      persistentVolumeClaim:
        claimName: workload-pvc
