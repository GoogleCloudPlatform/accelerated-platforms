apiVersion: batch/v1
kind: Deployment
metadata:
  name: benchmark
  namespace: _NAMESPACE_
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: benchmark-job
    spec:
      serviceAccountName: _KSA_
      containers:
      - name: job
        image: _IMAGE_URL_
        imagePullPolicy: Always
        command: ["/bin/sh"]
        args:
        - -c
        - |
          ACTION=benchmark python3 /locustfile.py
        env:
        - name: "ENDPOINT"
          value: "_ENDPOINT_"
        - name: "MODEL_ID"
          value: "_BENCHMARK_MODEL_PATH_" 
        - name: "HOST"
          value: "_HOST_"   
        resources:
          requests:
            cpu: "2"
            memory: "5Gi"
          limits:
            cpu: "2"
            memory: "5Gi"
      restartPolicy: Never
---
kind: Service
apiVersion: v1
metadata:
  name: locust-web
  namespace: _NAMESPACE_
  annotations:
    networking.gke.io/load-balancer-type: "Internal"
  labels:
    app: benchmark
spec:
  ports:
    - port: 8089
      targetPort: loc-master-web
      protocol: TCP
      name: loc-master-web
  selector:
    app: benchmark
  type: LoadBalancer