apiVersion: v1
kind: PersistentVolume
metadata:
  name: model-weights-disk
  namespace: _NAMESPACE_
  labels:
    pv-usage: model-weights
    pv-spec: ssd-1024G
spec:
  storageClassName: ""
  capacity:
    storage: 1024Gi
  accessModes:
    - ReadWriteOnce
  csi:
    driver: pd.csi.storage.gke.io
    volumeHandle: projects/_PROJECT_ID_/zones/_ZONE_/disks/_DISK_
    fsType: ext4
    readOnly: true
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: topology.gke.io/zone
          operator: In
          values:
          - _ZONE_
  mountOptions:
  - read_ahead_kb=4096
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-model-weights-claim-ro
  namespace: _NAMESPACE_
spec:
  storageClassName: ""
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1024Gi
  selector:
    matchLabels:
      pv-usage: model-weights
      pv-spec: ssd-1024G
---      
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-openai
  namespace: _NAMESPACE_  # replace with your namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-openai
  template:
    metadata:
      labels:
        app: vllm-openai
    spec:
      serviceAccountName: _KSA_
      containers:
      - name: inference-server
        image: vllm/vllm-openai:v0.5.3.post1
        resources:
          requests:
            cpu: "2"
            memory: "25Gi"
            ephemeral-storage: "25Gi"
            nvidia.com/gpu: "2"
          limits:
            cpu: "2"
            memory: "25Gi"
            ephemeral-storage: "25Gi"
            nvidia.com/gpu: "2"
        args:
        - --model=$(MODEL)
        - --tensor-parallel-size=2
        env:
        - name: MODEL
          value: /data/models/_MODEL_ID_/_MODEL_PATH_
        - name: VLLM_ATTENTION_BACKEND
          value: FLASHINFER
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
        - name: model-disk
          mountPath: /data/models
          readOnly: true
      volumes:
      - name: dshm
        emptyDir:
            medium: Memory
      - name: model-disk
        persistentVolumeClaim:
          claimName: pvc-model-weights-claim-ro
          readOnly: true
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "cloud.google.com/gke-queued"
        value: "true"
        operator: "Equal"
        effect: "NoSchedule"
      - key: "on-demand"
        value: "true"
        operator: "Equal"
        effect: "NoSchedule"
      nodeSelector:
        cloud.google.com/gke-accelerator: _ACCELERATOR_
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-openai
  namespace: _NAMESPACE_  # replace with your namespace
spec:
  selector:
    app: vllm-openai
  type: ClusterIP
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
