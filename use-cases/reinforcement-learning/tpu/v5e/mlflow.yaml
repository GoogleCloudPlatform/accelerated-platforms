apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-deployment-v5e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-v5e
  template:
    metadata:
      labels:
        app: mlflow-v5e
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:latest
        command: 
        - "mlflow"
        - "server"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "5000"
        # Explicitly trust the Kubernetes internal FQDN and short name
        - "--allowed-hosts"
        - "*"
        # Add the CORS wildcard flag
        - "--cors-allowed-origins"
        - "*"
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service-v5e
spec:
  selector:
    app: mlflow-v5e
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
  type: ClusterIP # Keeps it internal and secure
  
